name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

      - name: Validate JSON files
        run: |
          python -m json.tool infra/adf/linked_services.json > /dev/null
          python -m json.tool infra/adf/datasets.json > /dev/null
          python -m json.tool infra/adf/pipeline_nyc311_ingest.json > /dev/null
          python -m json.tool infra/adf/triggers.json > /dev/null