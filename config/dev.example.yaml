# Public-safe development config template.
# Copy this file to config/dev.yaml for local cloud experimentation and replace
# placeholders with non-secret Azure, ADF, and Databricks identifiers.

environment: dev

azure:
  subscription_id: "YOUR_SUBSCRIPTION_ID"
  resource_group: "YOUR_RESOURCE_GROUP"
  storage_account: "YOUR_STORAGE_ACCOUNT"
  container: "YOUR_CONTAINER"

adf:
  factory_name: "YOUR_ADF_FACTORY"
  pipeline_name: "pl_nyc311_ingest"

databricks:
  workspace_url: "YOUR_DATABRICKS_WORKSPACE_URL"
  secret_scope: "adls-sp"
  sp_client_id_key: "client-id"
  sp_client_secret_key: "client-secret"
  sp_tenant_id_key: "tenant-id"
  catalog: "YOUR_CATALOG"
  bronze_schema: "bronze"
  silver_schema: "silver"
  gold_schema: "gold"

source:
  system_name: "nyc_311_api"
  base_url: "https://data.cityofnewyork.us/resource/erm2-nwe9.json"
  page_size: 1000
  max_pages_per_run: 10
  timeout_seconds: 30
  order_by: "created_date ASC"
  watermark_field: "created_date"
  watermark_state_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/bronze/checkpoints/nyc311_service_requests/watermark_state"

paths:
  bronze_base_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/bronze"
  silver_base_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/silver"
  gold_base_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/gold"
  checkpoint_base_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/bronze/checkpoints"
  bronze_raw_batch_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/bronze/nyc311_service_requests_raw/raw_batches"

bronze:
  raw_landing_path: "abfss://raw@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/nyc311/service_requests/raw"
  checkpoint_path: "abfss://YOUR_CONTAINER@YOUR_STORAGE_ACCOUNT.dfs.core.windows.net/bronze/checkpoints"
  table_name: "bronze.nyc311_service_requests_raw"
